<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmación de Formulario</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script type="module" src="confirmation.ts"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-b from-[#ae08c4] to-[#4fa6e0] font-['Inter',sans-serif] overflow-hidden relative">
  <div class="absolute inset-0 z-0">
    <div class="w-full h-full" id="three-container"></div>
  </div>
  <div class="relative z-10 text-center text-[#1c2526] p-8 bg-white/90 rounded-xl shadow-[0_8px_32px_rgba(0,0,0,0.1)] max-w-[600px] m-4">
    <h1 class="text-[2.5rem] max-md:text-[2rem] font-bold mb-4 text-[#111]">¡Formulario Enviado!</h1>
    <p class="text-[1.2rem] max-md:text-[1rem] mb-8 text-[#333]">Gracias por contactarnos. Nos pondremos en contacto contigo.</p>
    <button class="px-6 py-3 rounded-lg bg-[#111] text-white text-base font-medium transition-colors duration-200 hover:bg-[#222]" onclick="goBack()">Regresar</button>
  </div>
</body>
</html>
